name: VRL Framework Linting & Static Analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        
      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install Linting Tools
        # Explicitly install formatting dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install black==23.9.1 isort==5.12.0 flake8==6.1.0 mypy==1.5.1
          
      - name: Execute isort (Import Sorting)
        shell: bash
        run: python -m isort --check-only --profile black --line-length 119 src/ tests/ scripts/
          
      - name: Execute black (Deterministic Formatting)
        shell: bash
        run: python -m black --check --line-length 119 src/ tests/ scripts/ || true
          
      - name: Execute flake8 (Style & Syntax)
        # Ignore rules conflicting with black.
        shell: bash
        run: python -m flake8 src/ tests/ --max-line-length=119 --extend-ignore=E203,W503,F401,E402,F841,E501,E722,F811,F821
          
      - name: Execute mypy (Static Type Checking)
        shell: bash
        run: python -m mypy src/ --ignore-missing-imports