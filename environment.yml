# VRL Framework Environment
# Defines the Python runtime and dependencies for deterministic execution.

name: vrl_env

channels:
  - conda-forge
  - defaults

dependencies:
  # Core Runtime
  - python=3.10
  - pip
  
  # Package Manager & Dependencies
  - pip:
      # PyTorch CUDA 12.1 binding
      - --extra-index-url https://download.pytorch.org/whl/cu121
      
      # PyTorch
      - torch==2.5.1+cu121
      - torchvision==0.20.1+cu121
      - torchaudio==2.5.1+cu121
      
      # Quantization & Memory
      - bitsandbytes==0.49.2
      
      # GPU Simulation & Kernels
      - warp-lang==1.13.0
      
      # Tensors & Math
      - einops==0.8.2
      - numpy==1.26.4
      - jaxtyping==0.3.7
      - safetensors==0.7.0
      
      # Logging
      - wandb==0.27.0
      
      # Data Processing & Utilities
      - scipy==1.15.3
      - pandas==2.1.4
      - matplotlib==3.10.9
      - networkx==3.4.2
      - decord==0.6.0
      
      # Type Validation
      - pydantic==2.13.4
      - psutil>=5.9.0
      - lmdb==2.2.1
      - pyzmq==27.1.0

      # Testing & Reproducibility
      - pytest>=7.0
      - pytest-benchmark>=4.0
      - hypothesis>=6.0
      - pipreqs
      - black>=23.0
      - isort>=5.0